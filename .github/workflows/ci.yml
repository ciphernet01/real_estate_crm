name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  smoke-docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Start docker stack
        run: docker compose -f docker-compose.deploy.yml up --build -d
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/api/health >/dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1
      - name: Run UAT smoke checks
        run: bash ./scripts/uat-smoke.sh
      - name: Print backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.deploy.yml logs backend --tail 200
      - name: Stop docker stack
        if: always()
        run: docker compose -f docker-compose.deploy.yml down -v
