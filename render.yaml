databases:
  - name: real-estate-crm-db
    databaseName: crm
    user: crm_admin
    region: ohio
    plan: free

services:
  - type: web
    name: real-estate-crm-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm ci --omit=dev && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: real-estate-crm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://real-estate-crm-frontend.onrender.com"
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: real-estate-crm-frontend
    env: static
    region: ohio
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://real-estate-crm-backend.onrender.com/api"
